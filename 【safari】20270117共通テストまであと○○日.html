<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#9b3f20">
<title>共通テストまであと何日</title>
<style>
:root {
  --top: #c76534;
  --middle: #9f4225;
  --bottom: #662414;
  --number: #fff0b0;
  --text: #fffaf3;
  --sub: #f6d7c4;
  --band: rgba(82, 24, 11, 0.72);
  --line: rgba(255,255,255,0.28);
}

* { box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: linear-gradient(155deg, var(--top) 0%, var(--middle) 48%, var(--bottom) 100%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
}

body {
  min-height: 100svh;
  transition: background 1.2s ease;
}

.screen {
  width: 100%;
  height: 100%;
  min-height: 100svh;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  gap: clamp(4px, 1vh, 14px);
  padding:
    max(18px, env(safe-area-inset-top))
    max(26px, env(safe-area-inset-right))
    max(16px, env(safe-area-inset-bottom))
    max(26px, env(safe-area-inset-left));
}

header {
  display: grid;
  grid-template-columns: 1fr minmax(260px, 34vw);
  align-items: start;
  gap: 24px;
}

.heading {
  padding-top: 6px;
}

.eyebrow {
  margin: 0 0 3px;
  color: var(--sub);
  font-size: clamp(14px, 1.5vw, 24px);
  font-weight: 700;
  letter-spacing: .12em;
}

h1 {
  margin: 0;
  font-size: clamp(34px, 4.5vw, 70px);
  line-height: 1.08;
  font-weight: 900;
  letter-spacing: .035em;
}

.logo {
  width: 100%;
  max-height: 17vh;
  object-fit: contain;
  object-position: right top;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.22));
}

main {
  min-height: 0;
  display: grid;
  place-items: center;
}

.countdown {
  width: 100%;
  height: 100%;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}

.lead {
  margin-right: clamp(8px, 2vw, 30px);
  color: var(--text);
  font-size: clamp(46px, 7vw, 112px);
  font-weight: 900;
  text-shadow: 0 4px 12px rgba(0,0,0,.22);
}

#days {
  color: var(--number);
  font-size: clamp(190px, 39vw, 570px);
  line-height: .74;
  font-weight: 950;
  letter-spacing: -.065em;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 8px 25px rgba(50,14,5,.38);
  transition: color 1.2s ease, transform .4s ease;
}

.unit {
  margin-left: clamp(12px, 2vw, 34px);
  align-self: flex-end;
  padding-bottom: clamp(18px, 4vh, 56px);
  font-size: clamp(48px, 8vw, 128px);
  font-weight: 900;
  text-shadow: 0 4px 12px rgba(0,0,0,.22);
}

.info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  padding: 0 5px;
  color: var(--sub);
  font-size: clamp(14px, 1.55vw, 24px);
  font-weight: 700;
}

.info strong {
  color: var(--text);
}

.message-band {
  margin: 0 calc(-1 * max(26px, env(safe-area-inset-right)))
          calc(-1 * max(16px, env(safe-area-inset-bottom)))
          calc(-1 * max(26px, env(safe-area-inset-left)));
  padding:
    clamp(13px, 2vh, 25px)
    max(28px, env(safe-area-inset-right))
    max(15px, env(safe-area-inset-bottom))
    max(28px, env(safe-area-inset-left));
  text-align: center;
  background: var(--band);
  border-top: 1px solid var(--line);
  font-size: clamp(20px, 2.25vw, 36px);
  line-height: 1.48;
  font-weight: 800;
  letter-spacing: .025em;
}

@media (orientation: portrait) {
  .screen {
    grid-template-rows: auto 1fr auto auto;
    gap: 8px;
  }

  header {
    grid-template-columns: 1fr;
  }

  .logo {
    position: absolute;
    top: max(18px, env(safe-area-inset-top));
    right: max(20px, env(safe-area-inset-right));
    width: min(44vw, 330px);
    max-height: 13vh;
  }

  .heading {
    padding-right: min(42vw, 315px);
  }

  h1 {
    font-size: clamp(27px, 6.3vw, 54px);
  }

  .countdown {
    flex-wrap: wrap;
    align-content: center;
  }

  .lead {
    width: 100%;
    margin: 0 0 -1vh;
    text-align: center;
    font-size: clamp(42px, 10vw, 76px);
  }

  #days {
    font-size: clamp(210px, 56vw, 500px);
  }

  .unit {
    font-size: clamp(52px, 13vw, 102px);
    padding-bottom: 3vh;
  }

  .info {
    flex-direction: column;
    gap: 3px;
    text-align: center;
  }

  .message-band {
    font-size: clamp(18px, 4.2vw, 31px);
  }
}
</style>
</head>

  <main>
    <div class="countdown" aria-live="polite">
      <span class="lead">あと</span>
      <span id="days">---</span>
      <span class="unit" id="unit">日</span>
    </div>
  </main>

  <div class="info">
    <div><strong>試験日：</strong>2027年1月16日（土）・17日（日）</div>
    <div><strong>本日：</strong><span id="today">----</span></div>
  </div>

  <div class="message-band">
    本番前に『あと少し時間があれば』と思う時間は、<br>
    今日妥協してしまう時間かもしれない
  </div>
</div>

<script>
(() => {
  const target = { year: 2027, month: 1, day: 16 };
  const MS_PER_DAY = 86400000;

  function japanDateParts() {
    const parts = new Intl.DateTimeFormat("ja-JP", {
      timeZone: "Asia/Tokyo",
      year: "numeric",
      month: "numeric",
      day: "numeric",
      weekday: "short"
    }).formatToParts(new Date());

    const get = type => parts.find(p => p.type === type)?.value ?? "";
    return {
      year: Number(get("year")),
      month: Number(get("month")),
      day: Number(get("day")),
      weekday: get("weekday")
    };
  }

  function applyStage(days) {
    const root = document.documentElement;

    if (days <= 7) {
      root.style.setProperty("--top", "#bd321e");
      root.style.setProperty("--middle", "#8d2017");
      root.style.setProperty("--bottom", "#50100c");
      root.style.setProperty("--number", "#fff4b8");
    } else if (days <= 30) {
      root.style.setProperty("--top", "#d34f27");
      root.style.setProperty("--middle", "#a8341e");
      root.style.setProperty("--bottom", "#641b12");
      root.style.setProperty("--number", "#ffe895");
    } else if (days <= 50) {
      root.style.setProperty("--top", "#d76d30");
      root.style.setProperty("--middle", "#ad4825");
      root.style.setProperty("--bottom", "#6c2716");
      root.style.setProperty("--number", "#ffedaa");
    } else if (days <= 100) {
      root.style.setProperty("--top", "#cf793d");
      root.style.setProperty("--middle", "#a6552c");
      root.style.setProperty("--bottom", "#71301c");
      root.style.setProperty("--number", "#fff0bd");
    } else {
      root.style.setProperty("--top", "#c76534");
      root.style.setProperty("--middle", "#9f4225");
      root.style.setProperty("--bottom", "#662414");
      root.style.setProperty("--number", "#fff0b0");
    }
  }

  function update() {
    const now = japanDateParts();
    const todayUtc = Date.UTC(now.year, now.month - 1, now.day);
    const targetUtc = Date.UTC(target.year, target.month - 1, target.day);
    const days = Math.ceil((targetUtc - todayUtc) / MS_PER_DAY);

    const daysEl = document.getElementById("days");
    const unitEl = document.getElementById("unit");

    document.getElementById("today").textContent =
      `${now.year}年${now.month}月${now.day}日（${now.weekday}）`;

    applyStage(days);

    if (days > 0) {
      daysEl.textContent = String(days);
      unitEl.textContent = "日";
    } else if (days === 0) {
      daysEl.textContent = "本番";
      unitEl.textContent = "";
    } else {
      daysEl.textContent = "終了";
      unitEl.textContent = "";
    }
  }

  update();
  setInterval(update, 60000);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) update();
  });
})();
</script>
