<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Warm Vivid</title><style>:root{--top:#ff8a2a;--mid:#f04f17;--bot:#9d210d;--num:#fff59d;--txt:#fff;--sub:#ffe0c2}html,body{margin:0;height:100%;overflow:hidden;background:var(--bot);font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif}.bg{position:fixed;inset:0;background:linear-gradient(155deg,var(--top),var(--mid) 48%,var(--bot))}.wrap{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;padding:24px}header{text-align:center}.small{color:var(--sub);font-weight:700}h1{margin:.2em 0;color:var(--txt);font-size:clamp(36px,5vw,74px)}main{flex:1;display:flex;justify-content:center;align-items:center}.row{display:flex;align-items:flex-end}.lead,.unit{color:#fff;font-weight:900;padding-bottom:40px;font-size:clamp(48px,7vw,92px)}#days{color:var(--num);font-weight:950;font-size:clamp(220px,40vw,560px);line-height:.8}.info{display:flex;justify-content:space-between;color:var(--sub);font-weight:700}</style></head><body><div class="bg"></div><div class="wrap"><header><div class="small">2027年度入試</div><h1>大学入学共通テストまで</h1></header><main><div class="row"><div class="lead">あと</div><div id="days"></div><div class="unit">日</div></div></main><div class="info"><div>試験日：2027年1月16日（土）・17日（日）</div><div id="today"></div></div></div><script>const t=Date.UTC(2027,0,16),w=["日","月","火","水","木","金","土"];function u(){const n=new Date(),j=new Date(n.getTime()+n.getTimezoneOffset()*60000+32400000),y=j.getFullYear(),m=j.getMonth(),d=j.getDate(),diff=Math.ceil((t-Date.UTC(y,m,d))/86400000);document.getElementById("days").textContent=diff>0?diff:(diff==0?"本番":"終了");document.getElementById("today").textContent=`本日：${y}年${m+1}月${d}日（${w[j.getDay()]}）`;}u();setInterval(u,60000);</script></body></html>
